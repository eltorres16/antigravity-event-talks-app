<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A beautiful dashboard to view the latest BigQuery release notes and easily share specific updates on Twitter.">
    <title>BigQuery Release Notes Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
</head>
<body>
    <header>
        <div class="logo-container">
            <div class="logo-icon">BQ</div>
            <h1>BigQuery Release Notes</h1>
        </div>
        <div class="header-actions">
            <button id="theme-toggle" class="btn btn-secondary" title="Cambiar tema (Claro/Oscuro)">
                <svg id="theme-icon-moon" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
                <svg id="theme-icon-sun" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="display: none;">
                    <circle cx="12" cy="12" r="5"/>
                    <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                </svg>
                <span id="theme-text">Claro</span>
            </button>
            <button id="export-csv-btn" class="btn btn-secondary" title="Exportar notas actuales a CSV">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                </svg>
                <span>Export to CSV</span>
            </button>
            <button id="refresh-btn" class="btn btn-secondary" title="Fetch latest release notes from Google Cloud">
                <span id="refresh-spinner" class="spinner"></span>
                <span>Refresh</span>
            </button>
        </div>
    </header>

    <main>
        <!-- Left: Release Notes Feed -->
        <section class="releases-column">
            <div class="filters-bar">
                <input type="text" id="search-input" class="search-input" placeholder="Search updates, keywords, dates...">
                <div class="filter-tags">
                    <button class="filter-tag active" data-filter="all">All</button>
                    <button class="filter-tag" data-filter="feature">Features</button>
                    <button class="filter-tag" data-filter="changed">Changes</button>
                    <button class="filter-tag" data-filter="deprecated">Deprecated</button>
                    <button class="filter-tag" data-filter="fixed">Fixes</button>
                    <button class="filter-tag" data-filter="security">Security</button>
                </div>
            </div>

            <!-- Feed Timeline Container -->
            <div id="timeline-container">
                <!-- Loaded dynamically by app.js -->
            </div>
        </section>

        <!-- Right: Tweet Composer Sidebar -->
        <aside class="sidebar-column">
            <div class="sidebar-panel">
                <h2 class="panel-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/>
                    </svg>
                    Tweet Composer
                </h2>
                
                <div class="tweet-composer">
                    <!-- Placeholder State (No Selection) -->
                    <div id="composer-placeholder" class="composer-placeholder">
                        <svg viewBox="0 0 24 24">
                            <path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/>
                        </svg>
                        <p>Select any release note card on the left to draft a Tweet about it.</p>
                    </div>

                    <!-- Active Form State -->
                    <div id="composer-form" class="composer-form">
                        <textarea id="tweet-textarea" class="tweet-textarea" placeholder="Draft your tweet here..."></textarea>
                        <div class="composer-footer">
                            <span id="char-counter" class="char-counter">0 / 280</span>
                            <div style="display: flex; gap: 0.5rem;">
                                <button id="cancel-tweet-btn" class="btn btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.9rem;">Cancel</button>
                                <button id="tweet-btn" class="btn btn-twitter" style="padding: 0.5rem 1rem; font-size: 0.9rem;">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/>
                                    </svg>
                                    Tweet
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
